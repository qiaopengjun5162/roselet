services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: roselet
      POSTGRES_USER: roselet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roselet -d roselet"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE}
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://roselet:${POSTGRES_PASSWORD}@db:5432/roselet
      PORT: ${PORT:-3001}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      RUST_LOG: ${RUST_LOG:-roselet=info}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
      PRIVATE_ROSE_MONTHLY_LIMIT: ${PRIVATE_ROSE_MONTHLY_LIMIT:-10}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
