name: Deploy Backend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-backend
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    name: Build image and deploy to Lightsail
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production
      url: https://roselet.47.131.238.0.sslip.io

    steps:
      - name: Resolve deployment metadata
        id: meta
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          image="$(printf 'ghcr.io/%s/roselet-backend' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tagged_image=$image:$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      - name: Check out deployment commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ steps.meta.outputs.tagged_image }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate deployment secrets
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$LIGHTSAIL_HOST"
          test -n "$LIGHTSAIL_USER"
          test -n "$LIGHTSAIL_SSH_KEY"
          test -n "$LIGHTSAIL_KNOWN_HOSTS"

      - name: Install SSH credentials
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$LIGHTSAIL_SSH_KEY" > ~/.ssh/lightsail
          chmod 600 ~/.ssh/lightsail
          printf '%s\n' "$LIGHTSAIL_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Pull deployment commit on Lightsail
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/lightsail "$LIGHTSAIL_USER@$LIGHTSAIL_HOST" <<'REMOTE'
          set -euo pipefail
          cd ~/roselet
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          chmod +x scripts/lightsail-deploy.sh
          REMOTE

      - name: Log in to GHCR on Lightsail
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/lightsail "$LIGHTSAIL_USER@$LIGHTSAIL_HOST" \
            "sudo docker login ghcr.io -u '${{ github.actor }}' --password-stdin"

      - name: Deploy backend on Lightsail
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
          BACKEND_IMAGE: ${{ steps.meta.outputs.tagged_image }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/lightsail "$LIGHTSAIL_USER@$LIGHTSAIL_HOST" \
            "cd ~/roselet && BACKEND_IMAGE='$BACKEND_IMAGE' bash scripts/lightsail-deploy.sh"

      - name: Public smoke test
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          set -euo pipefail
          curl -fsS "https://roselet.$LIGHTSAIL_HOST.sslip.io/health"

      - name: Log out from GHCR on Lightsail
        if: always()
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          ssh -i ~/.ssh/lightsail "$LIGHTSAIL_USER@$LIGHTSAIL_HOST" \
            "sudo docker logout ghcr.io || true"
