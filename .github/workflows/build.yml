name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: roselet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Run migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost/roselet_test
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx migrate run --source crates/backend/migrations

      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost/roselet_test
          NO_PROXY: localhost,127.0.0.1
        run: cargo nextest run --all-features -j1

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM
        run: cd crates/recommend && wasm-pack build --target web --out-dir ../../apps/web/public/pkg

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup just
        uses: extractions/setup-just@v2


      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  miniprogram:
    name: Miniprogram Build
    env:
      TARO_APP_ID: wx4408068e26478673
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup just
        uses: extractions/setup-just@v2


      - name: Install dependencies
        run: pnpm install

      - name: Build WASM for miniprogram
        run: just wasm-mini

      - name: Build miniprogram
        run: just miniprogram-build

      - name: Test miniprogram
        run: cd apps/miniprogram && pnpm test
